<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Kansas Storm Chasing</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;

      color:white;

      background:
      linear-gradient(rgba(0,0,0,.88), rgba(0,0,0,.88)),
      url("logo.jpg");

      background-size:700px;
      background-repeat:repeat;
      background-attachment:fixed;
    }

    .container{
      width:100%;
      max-width:1000px;
    }

    .update-box{
      background:rgba(10,18,40,.95);
      border:3px solid #2563eb;
      border-radius:35px;
      padding:70px 40px;
      box-shadow:0 0 40px rgba(37,99,235,.45);
      backdrop-filter:blur(8px);
    }

    h1{
      text-align:center;
      font-size:72px;
      margin-bottom:20px;
      font-weight:900;
    }

    .yellow{
      color:#facc15;
    }

    .blue{
      color:#3b82f6;
    }

    .desc{
      text-align:center;
      color:#d1d5db;
      font-size:22px;
      line-height:1.8;
      margin-bottom:50px;
    }

    .tracker-title{
      text-align:center;
      font-size:58px;
      margin-bottom:50px;
      font-weight:900;
    }

    .tracker-item{
      margin-bottom:40px;
    }

    .tracker-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:14px;
      font-size:20px;
      font-weight:bold;
    }

    .progress-bar{
      width:100%;
      height:24px;
      border-radius:30px;
      overflow:hidden;
      border:2px solid #2563eb;
      background:#091226;
    }

    .progress{
      height:100%;
      border-radius:30px;
      transition:1.2s ease;
    }

    .yellow-bar{
      background:#facc15;
    }

    .blue-bar{
      background:#3b82f6;
    }

    .green-bar{
      background:#22c55e;
    }

    .orange-bar{
      background:#f97316;
    }

    .footer{
      text-align:center;
      margin-top:55px;
      color:#9ca3af;
      font-size:18px;
    }

    @media(max-width:768px){

      .update-box{
        padding:50px 25px;
      }

      h1{
        font-size:46px;
      }

      .tracker-title{
        font-size:40px;
      }

      .desc{
        font-size:18px;
      }

      .tracker-top{
        font-size:16px;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <div class="update-box">

      <h1>

        STORE IS DOWN
        <span class="yellow">FOR UPDATES</span>

      </h1>

      <p class="desc">

        Kansas Storm Chasing is currently updating the merch store,
        improving payments, and adding new products.

        <br><br>

        Please check back soon.

      </p>

      <h2 class="tracker-title">

        UPDATE
        <span class="blue">TRACKER</span>

      </h2>

      <!-- TRACKER 1 -->

      <div class="tracker-item">

        <div class="tracker-top">
          <span>Adding New Shirt</span>
          <span id="percent1">90%</span>
        </div>

        <div class="progress-bar">
          <div class="progress yellow-bar"
          id="bar1"></div>
        </div>

      </div>

      <!-- TRACKER 2 -->

      <div class="tracker-item">

        <div class="tracker-top">
          <span>Payment System Upgrade</span>
          <span id="percent2">65%</span>
        </div>

        <div class="progress-bar">
          <div class="progress blue-bar"
          id="bar2"></div>
        </div>

      </div>

      <!-- TRACKER 3 -->

      <div class="tracker-item">

        <div class="tracker-top">
          <span>New Product Photos</span>
          <span id="percent3">40%</span>
        </div>

        <div class="progress-bar">
          <div class="progress green-bar"
          id="bar3"></div>
        </div>

      </div>

      <!-- TRACKER 4 -->

      <div class="tracker-item">

        <div class="tracker-top">
          <span>Store Optimization</span>
          <span id="percent4">75%</span>
        </div>

        <div class="progress-bar">
          <div class="progress orange-bar"
          id="bar4"></div>
        </div>

      </div>

      <div class="footer">
        © 2026 Kansas Storm Chasing
      </div>

    </div>

  </div>

  <script>

    // CHANGE THESE PERCENTAGES

    let progress1 = 0;
    let progress2 = 0;
    let progress3 = 100;
    let progress4 = 100;

    // AUTO UPDATE BARS

    document.getElementById("bar1").style.width =
    progress1 + "%";

    document.getElementById("bar2").style.width =
    progress2 + "%";

    document.getElementById("bar3").style.width =
    progress3 + "%";

    document.getElementById("bar4").style.width =
    progress4 + "%";

    // AUTO UPDATE TEXT

    document.getElementById("percent1").innerText =
    progress1 + "%";

    document.getElementById("percent2").innerText =
    progress2 + "%";

    document.getElementById("percent3").innerText =
    progress3 + "%";

    document.getElementById("percent4").innerText =
    progress4 + "%";

  </script>

</body>
</html>
