<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kansas Storm Chasing</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      color:white;

      background:
      linear-gradient(rgba(0,0,0,.88), rgba(0,0,0,.88)),
      url("logo.jpg");

      background-size:700px;
      background-repeat:repeat;
      background-attachment:fixed;
      padding:20px;
    }

    .update-box{
      background:rgba(17,24,39,.92);
      border:3px solid #2563eb;
      border-radius:35px;
      padding:70px 40px;
      max-width:850px;
      width:100%;
      box-shadow:0 0 40px rgba(37,99,235,.4);
      backdrop-filter:blur(8px);
    }

    .update-box img{
      width:180px;
      border-radius:30px;
      margin-bottom:30px;
      border:4px solid #facc15;
      box-shadow:0 0 30px rgba(250,204,21,.35);
    }

    h1{
      font-size:64px;
      margin-bottom:20px;
      font-weight:900;
      line-height:1.1;
    }

    .yellow{
      color:#facc15;
    }

    .blue{
      color:#3b82f6;
    }

    p{
      color:#d1d5db;
      font-size:22px;
      line-height:1.8;
      margin-bottom:35px;
    }

    .status{
      display:inline-block;
      background:#2563eb;
      color:white;
      padding:14px 28px;
      border-radius:14px;
      font-size:18px;
      font-weight:bold;
      box-shadow:0 0 20px rgba(37,99,235,.45);
    }

    .footer{
      margin-top:40px;
      color:#9ca3af;
      font-size:15px;
    }

    @media(max-width:768px){

      .update-box{
        padding:50px 25px;
      }

      h1{
        font-size:42px;
      }

      p{
        font-size:18px;
      }

      .update-box img{
        width:140px;
      }

    }

  </style>
</head>

<body>

  <div class="update-box">

    <img src="logo.jpg" alt="Kansas Storm Chasing Logo">

    <h1>
      STORE IS DOWN
      <span class="yellow">FOR UPDATES</span>
    </h1>

    <p>
      Kansas Storm Chasing is currently updating the merch store
      and improving the website experience.

      <br><br>

      Please check back soon for new merch,
      updated products, and future releases.
    </p>

    <div class="status">
      Website Updates In Progress
    </div>

    <div class="footer">
      © 2026 Kansas Storm Chasing
    </div>

  </div>

</body>
</html>
